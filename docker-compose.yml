version: '3.9'
services:
  backend:
    build: ./
    command: uvicorn monorepo.backend.app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
  frontend:
    build: ./
    command: streamlit run monorepo/frontend/src/app.py --server.port 8501
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
